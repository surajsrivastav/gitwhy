version: 2
project_name: gitwhy

before:
  hooks:
    - go mod tidy

builds:
  - binary: ghw
    ldflags:
      - -s -w
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

brews:
  - name: ghw
    repository:
      owner: surajsrivastav
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/surajsrivastav/gitwhy"
    description: "Intent-aware Git CLI — wraps gh with provenance tracking"
    license: "MIT"
    install: |
      bin.install "ghw"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
